name: Zenny CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── 백엔드 API 테스트 ──────────────────────────────────────
  api-test:
    name: API (Node.js + Prisma)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: zenny_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://admin:password@localhost:5432/zenny_test
      JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: sk-test-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

  # ─── 모바일 TypeScript 검사 ─────────────────────────────────
  mobile-check:
    name: Mobile (React Native TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Expo EAS 빌드 (main 브랜치만) ─────────────────────────
  eas-build:
    name: Expo EAS Build (Preview)
    runs-on: ubuntu-latest
    needs: [mobile-check]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Preview)
        run: eas build --platform all --profile preview --non-interactive
        continue-on-error: true   # 토큰 없으면 skip

  # ─── Vercel 배포 (main 브랜치만) ───────────────────────────
  deploy-api:
    name: Deploy API to Railway/Render
    runs-on: ubuntu-latest
    needs: [api-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: echo "Railway/Render 배포 설정 시 여기에 추가"
        # RAILWAY_TOKEN secret 설정 후 아래 사용:
        # uses: bervProject/railway-deploy@v1.0.0
        # with:
        #   railway_token: ${{ secrets.RAILWAY_TOKEN }}
        #   service: zenny-api
